proxies:
  - enabled: true
    name: example_web_http
    type: http
    description: example http proxy
    local_ip: 127.0.0.1
    local_port: 8080
    custom_domains:
      - PLEASE_FILL_DOMAIN
    annotations:
      owner: example
    metadatas:
      env: demo
    transport:
      use_encryption: false
      use_compression: true
  - enabled: true
    name: example_ssh_tcp
    type: tcp
    description: example ssh proxy
    local_ip: 127.0.0.1
    local_port: 22
    remote_port: 6000
    annotations: {}
    metadatas: {}
    transport:
      use_encryption: false
      use_compression: false
  - enabled: false
    name: disabled_demo_udp
    type: udp
    description: disabled proxy should not render
    local_ip: 127.0.0.1
    local_port: 53
    remote_port: 6001
    annotations: {}
    metadatas: {}
    transport:
      use_encryption: false
      use_compression: false
